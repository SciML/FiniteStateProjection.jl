name: "Downgrade"

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch || github.ref != 'refs/tags/v*' }}

jobs:
  downgrade:
    name: "Downgrade"
    strategy:
      fail-fast: false
      matrix:
        group:
          - Core
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      group: ${{ matrix.group }}
      julia-version: "lts"
    secrets: "inherit"
